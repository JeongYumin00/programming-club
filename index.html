<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로그래밍 동아리</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #070a0f;
      color: #e8f4ff;
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
      /* 자석처럼 붙는 스크롤 설정 */
      scroll-snap-type: y mandatory;
    }

    .page {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      
      /* [중요] 기본 상태: 투명하고 살짝 아래에 위치 */
      opacity: 0;
      transform: translateY(30px);
      /* 부드러운 전환 효과 (시간을 1초로 늘려 더 고급스럽게) */
      transition: opacity 1s ease, transform 1s ease;
      
      position: relative;
    }

    /* [핵심] 화면 중앙에 들어온 페이지 스타일 */
    .page.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* [핵심] 화면에서 나가는 페이지를 더 희미하게 만듦 */
    .page:not(.active) {
      opacity: 0;
      transform: translateY(-30px); /* 위로 스르륵 사라지는 느낌 */
    }

    .content {
      max-width: 800px;
      padding: 0 20px;
    }

    .hero-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      color: #00ff9d;
      letter-spacing: 0.5em;
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: clamp(50px, 10vw, 120px);
      font-weight: 900;
      background: linear-gradient(135deg, #fff 20%, #00c8ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    h2 {
      font-size: clamp(30px, 6vw, 60px);
      color: #00c8ff;
      margin-bottom: 20px;
      font-weight: 900;
    }

    p {
      font-size: 18px;
      line-height: 1.8;
      color: rgba(232, 244, 255, 0.6);
    }

    .apply-btn {
      display: inline-block;
      margin-top: 40px;
      padding: 18px 45px;
      background: #00c8ff;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
      transition: 0.3s;
    }

    .apply-btn:hover {
      background: #00ff9d;
      transform: scale(1.05);
    }

    /* 스크롤 힌트 애니메이션 */
    .hero-hint {
      margin-top: 50px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: rgba(255,255,255,0.3);
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <section id="hero" class="page active">
    <div class="content">
      <p class="hero-sub">PROGRAMMING CLUB</p>
      <h1 class="hero-title">프로그래밍</h1>
      <p class="hero-hint">↓ SCROLL TO EXPLORE</p>
    </div>
  </section>

  <section id="intro" class="page">
    <div class="content">
      <h2>BEYOND CODE</h2>
      <p>단순한 코딩을 넘어, <br>실제로 가치를 만드는 프로덕트를 설계합니다.</p>
    </div>
  </section>

  <section id="activity" class="page">
    <div class="content">
      <h2>PROJECTS</h2>
      <p>프로젝트 활동부터 해커톤 등, <br>몰입의 즐거움을 함께 경험하세요.</p>
    </div>
  </section>

  <section id="apply" class="page">
  <div class="content">
    <h2>JOIN US</h2>
    <p>당신의 상상을 현실로 바꿀 준비가 되었나요?</p>
    
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeLQeG92t_kD2oa7I0fQl-DuHlgLQfljvSWV4HxbD1zT9M4CQ/viewform?usp=header" 
       class="apply-btn" 
       target="_blank" 
       rel="noopener noreferrer">APPLY NOW</a>
    </div>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // IntersectionObserver 설정
      const observerOptions = {
        root: null,
        // 페이지가 화면의 60% 이상 차지할 때 활성화
        threshold: 0.6 
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('active');
          } else {
            // 화면에서 벗어나면 다시 희미해지게 클래스 제거
            entry.target.classList.remove('active');
          }
        });
      }, observerOptions);

      document.querySelectorAll('.page').forEach((el) => observer.observe(el));
    });
  </script>
</body>
</html>
